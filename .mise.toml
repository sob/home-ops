[env]
KUBECONFIG = '{{config_root}}/.kubeconfig'
_.file = '{{config_root}}/.talos.env'
KUBERNETES_DIR = '{{config_root}}/kubernetes'
MINIJINJA_CONFIG_FILE = '{{config_root}}/.minijinja.toml'
TALOS_DIR = '{{config_root}}/talos'
SOPS_AGE_KEY_FILE = '{{config_root}}/age.key'
TALOSCONFIG = '{{config_root}}/.talosconfig'
# Tolerant: returns empty when the `op` CLI is absent (e.g. CI) or unresponsive.
# Bounded by timeout/gtimeout so a hung `op` (e.g. waiting on 1Password app
# authorization) can never block shell startup, since mise evaluates this env
# on activation in this directory. Falls back to empty if no timeout binary.
TF_VAR_onepassword_account = "{{ exec(command='bash -c \"T=$(command -v gtimeout || command -v timeout || echo false); $T 5 op account list --format json 2>/dev/null | jq -r .[0].url 2>/dev/null || true\"') }}"
TF_VAR_authentik_url = "https://10.1.100.207"
TFE_PARALLELISM = 5

[tools]
"python" = "3.14.6"
"pipx:flux-local" = "latest"
"pipx:check-jsonschema" = "latest"  # validates HelmRelease spec.values against the bjw-s app-template schema
pipx = "latest"
# Validation toolchain — pinned so local pre-commit/pre-push matches CI exactly.
task = "3.51.1"
yamllint = "1.38.0"
pre-commit = "4.6.0"
kustomize = "5.8.1"
kubeconform = "0.8.0"
flux2 = "2.8.8"  # the `flux` CLI — flux-local shells out to it
helm = "3.21.2"  # v3 to match Flux's embedded Helm SDK (avoid v4 render drift)
opa = "1.18.2"
yq = "4.53.3"
jq = "1.8.2"
gitleaks = "8.30.1"

[settings]
# Required for the [hooks] block below.
experimental = true

[hooks]
# Auto-wire git hooks after `mise install` so AI-generated YAML can't slip past
# locally. Skipped in CI (hooks run as workflow steps there).
postinstall = "test -n \"$CI\" || pre-commit install --install-hooks"
