---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: "${APP}-volsync-unlock"
spec:
  schedule: "${VOLSYNC_UNLOCK_SCHEDULE:-0 */6 * * *}"
  concurrencyPolicy: Forbid
  suspend: ${VOLSYNC_UNLOCK_SUSPENDED:-false}
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: "${APP}-volsync-unlock"
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 128Mi
          containers:
            - name: unlock
              image: docker.io/restic/restic:0.18.1
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: "${APP}-volsync-r2-secret"
              env:
                - name: RESTIC_CACHE_DIR
                  value: /tmp/restic-cache
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Unlocking restic repository for ${APP}..."
                  restic unlock || echo "Unlock failed or no stale locks present"
                  echo "Repository lock status:"
                  restic snapshots --latest 1 2>/dev/null || true
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
