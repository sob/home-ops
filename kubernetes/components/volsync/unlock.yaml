---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: "${APP}-volsync-unlock"
spec:
  schedule: "${VOLSYNC_UNLOCK_SCHEDULE:-0 * * * *}"
  concurrencyPolicy: Forbid
  suspend: ${VOLSYNC_UNLOCK_SUSPENDED:-false}
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: "${APP}-volsync-unlock"
        spec:
          restartPolicy: OnFailure
          serviceAccountName: "${APP}-volsync-unlock"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 128Mi
          containers:
            - name: unlock
              image: docker.io/restic/restic:0.18.1
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: "${APP}-volsync-r2-secret"
              env:
                - name: RESTIC_CACHE_DIR
                  value: /tmp/restic-cache
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Unlocking restic repository for ${APP}..."
                  # Only use --remove-all when no active VolSync mover is running for this app.
                  # Otherwise fall back to the safe stale-lock removal.
                  if kubectl get pods -n "$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)" \
                      -l "app.kubernetes.io/created-by=volsync" \
                      --field-selector=status.phase=Running \
                      2>/dev/null | grep -q "volsync-src-${APP}-r2"; then
                    echo "Active VolSync mover found for ${APP}, using safe unlock..."
                    restic unlock || echo "No stale locks to remove"
                  else
                    echo "No active VolSync mover found for ${APP}, using remove-all unlock..."
                    restic unlock --remove-all || echo "No locks to remove"
                  fi
                  echo "Repository lock status:"
                  restic snapshots --latest 1 2>/dev/null || true
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
