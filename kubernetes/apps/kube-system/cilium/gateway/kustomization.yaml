---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # The cilium gateways were retired in the Cilium->Envoy L7 cutover. This KS
  # now only owns the shared TLS certs (kept here to avoid cert-manager
  # re-issue) and the HTTP->HTTPS redirect route (re-attaches to the renamed
  # envoy gateways internal-gateway/external-gateway by name).
  - ./certificate.yaml
  - ./certificate-halfduplex.yaml
  - ./httproute-redirect.yaml
