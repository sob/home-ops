---
apiVersion: v1
kind: ConfigMap
metadata:
  name: node-local-dns
  namespace: kube-system
data:
  Corefile: |
    cluster.local:53 {
        errors
        cache {
            success 9984 30
            denial 9984 5
        }
        reload
        loop
        bind 0.0.0.0
        forward . 10.43.0.11 {
            force_tcp
        }
        prometheus 0.0.0.0:9253
        health 0.0.0.0:8080
    }
    in-addr.arpa:53 {
        errors
        cache 30
        reload
        loop
        bind 0.0.0.0
        forward . 10.43.0.11 {
            force_tcp
        }
    }
    ip6.arpa:53 {
        errors
        cache 30
        reload
        loop
        bind 0.0.0.0
        forward . 10.43.0.11 {
            force_tcp
        }
    }
    .:53 {
        errors
        cache 30
        reload
        loop
        bind 0.0.0.0
        forward . 10.43.0.11
    }
