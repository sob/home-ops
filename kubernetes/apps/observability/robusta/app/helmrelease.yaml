---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: robusta
spec:
  interval: 30m
  chart:
    spec:
      chart: robusta
      version: 0.44.0
      sourceRef:
        kind: HelmRepository
        name: robusta
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # No inline spec.values: Flux merges spec.values ON TOP of valuesFrom, so any
  # placeholder here permanently masks robusta-secret (this is what put the
  # ci-placeholder slack_sink into the runner and crashlooped it on invalid_auth).
  # CI placeholders now come from the robusta-ci-defaults ConfigMap, which is
  # listed FIRST so the real 1Password-backed robusta-secret overrides it.
  valuesFrom:
    - kind: ConfigMap
      name: robusta-ci-defaults
      valuesKey: values.yaml
    - kind: Secret
      name: robusta-secret
      valuesKey: values.yaml
