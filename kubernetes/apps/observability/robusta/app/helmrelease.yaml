---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: robusta
spec:
  interval: 30m
  chart:
    spec:
      chart: robusta
      version: 0.42.0
      sourceRef:
        kind: HelmRepository
        name: robusta
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # flux-local/CI renders this chart WITHOUT the secret-provided values, which
    # fails "at least one sink must be defined". This inline placeholder sink only
    # applies when valuesFrom is absent (CI); in-cluster the robusta-secret's
    # sinksConfig replaces it.
    sinksConfig:
      - slack_sink:
          name: ci-placeholder
          slack_channel: ci-placeholder
          api_key: ci-placeholder
  valuesFrom:
    - kind: Secret
      name: robusta-secret
      valuesKey: values.yaml
