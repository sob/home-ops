---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dozzle
spec:
  chartRef:
    kind: OCIRepository
    name: dozzle
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      dozzle:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: amir20/dozzle
              tag: v8.14.12
            env:
              DOZZLE_LEVEL: info
              DOZZLE_MODE: k8s
              DOZZLE_ENABLE_ACTIONS: "false"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      automountServiceAccountToken: true # 5.0 defaults false; DOZZLE_MODE=k8s needs API token
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    serviceAccount:
      dozzle: {}
    service:
      app:
        controller: dozzle
        ports:
          http:
            port: 8080
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/is-public: "true"
        hostnames: ["logs.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external-gateway
            namespace: network
            sectionName: https-56kbps
          - name: internal-gateway
            namespace: network
            sectionName: https-56kbps
        rules:
          - backendRefs:
              - identifier: app
                port: 8080
