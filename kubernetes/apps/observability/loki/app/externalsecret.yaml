---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: loki-secret
    template:
      engineVersion: v2
      data:
        # Reuse the same R2 credentials Thanos already uses (cloudflare item).
        # Loki expands these at runtime via -config.expand-env=true.
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
        R2_ENDPOINT: "{{ .CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
  dataFrom:
    - extract:
        key: cloudflare
