---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-network-syslog
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Infrastructure & Platform"
data:
  network-syslog.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "schemaVersion": 39,
      "tags": ["network", "syslog", "infrastructure"],
      "title": "Network & Syslog",
      "uid": "network-syslog",
      "time": { "from": "now-12h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "switch",
            "label": "Switch",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(unpoller_device_info{type=~\"usw|udm\", model!=\"USPRPS\"}, name)",
            "definition": "label_values(unpoller_device_info{type=~\"usw|udm\", model!=\"USPRPS\"}, name)",
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "type": "row",
          "title": "$switch — Port Health",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "id": 101,
          "title": "Odd ports (top row)",
          "type": "stat",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sort_desc(\n  max by (port_num) (\n    rate(unpoller_device_port_receive_errors_total{name=\"$switch\", port_num=~\".*[13579]\"}[5m])\n    + rate(unpoller_device_port_transmit_errors_total{name=\"$switch\", port_num=~\".*[13579]\"}[5m])\n    + rate(unpoller_device_port_receive_dropped_total{name=\"$switch\", port_num=~\".*[13579]\"}[5m])\n    + rate(unpoller_device_port_transmit_dropped_total{name=\"$switch\", port_num=~\".*[13579]\"}[5m])\n  )\n)\nor\n  max by (port_num) (unpoller_device_port_port_speed_bps{name=\"$switch\", port_num=~\".*[13579]\"}) * 0\nor\n  switch_port_exists{name=\"$switch\", port_num=~\".*[13579]\"}",
              "legendFormat": "{{port_num}}",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "sortBy",
              "options": {
                "fields": {},
                "sort": [{ "field": "Time", "desc": false }]
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "#2C3235", "value": null },
                  { "color": "#3D3D3D", "value": -1 },
                  { "color": "green", "value": 0 },
                  { "color": "#EAB839", "value": 0.01 },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "decimals": 1,
              "noValue": "—"
            },
            "overrides": []
          },
          "options": {
            "textMode": "name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "horizontal"
          }
        },
        {
          "id": 102,
          "title": "Even ports (bottom row)",
          "type": "stat",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sort_desc(\n  max by (port_num) (\n    rate(unpoller_device_port_receive_errors_total{name=\"$switch\", port_num=~\".*[02468]\"}[5m])\n    + rate(unpoller_device_port_transmit_errors_total{name=\"$switch\", port_num=~\".*[02468]\"}[5m])\n    + rate(unpoller_device_port_receive_dropped_total{name=\"$switch\", port_num=~\".*[02468]\"}[5m])\n    + rate(unpoller_device_port_transmit_dropped_total{name=\"$switch\", port_num=~\".*[02468]\"}[5m])\n  )\n)\nor\n  max by (port_num) (unpoller_device_port_port_speed_bps{name=\"$switch\", port_num=~\".*[02468]\"}) * 0\nor\n  switch_port_exists{name=\"$switch\", port_num=~\".*[02468]\"}",
              "legendFormat": "{{port_num}}",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "sortBy",
              "options": {
                "fields": {},
                "sort": [{ "field": "Time", "desc": false }]
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "#2C3235", "value": null },
                  { "color": "#3D3D3D", "value": -1 },
                  { "color": "green", "value": 0 },
                  { "color": "#EAB839", "value": 0.01 },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "decimals": 1,
              "noValue": "—"
            },
            "overrides": []
          },
          "options": {
            "textMode": "name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "horizontal"
          }
        },
        {
          "id": 200,
          "type": "row",
          "title": "Port Error History",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "collapsed": false
        },
        {
          "id": 201,
          "title": "Port error rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "topk(10, rate(unpoller_device_port_receive_errors_total{name=\"$switch\"}[5m]) + rate(unpoller_device_port_transmit_errors_total{name=\"$switch\"}[5m]))",
              "legendFormat": "Port {{port_num}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 20,
                "pointSize": 5,
                "spanNulls": false
              },
              "unit": "short",
              "decimals": 2
            }
          }
        },
        {
          "id": 202,
          "title": "Port traffic (top 10)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "topk(10, rate(unpoller_device_port_receive_bytes_total{name=\"$switch\"}[5m]))",
              "legendFormat": "Port {{port_num}} rx",
              "refId": "A"
            },
            {
              "expr": "-topk(10, rate(unpoller_device_port_transmit_bytes_total{name=\"$switch\"}[5m]))",
              "legendFormat": "Port {{port_num}} tx",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "unit": "Bps"
            }
          }
        },
        {
          "id": 300,
          "type": "row",
          "title": "Syslog & Logs",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "collapsed": false
        },
        {
          "id": 1,
          "title": "Syslog events/s by source",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 17 },
          "targets": [
            {
              "expr": "sum by (source) (rate(vector_log_events_total{source=~\"unifi|synology|network|printer\"}[5m]))",
              "legendFormat": "{{source}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Talos host log rate by node",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 17 },
          "targets": [
            {
              "expr": "sum by (host) (rate(vector_log_events_total{source=\"talos\"}[5m]))",
              "legendFormat": "{{host}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "UniFi firewall / IDS-IPS events",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 25 },
          "options": { "showTime": true, "wrapLogMessage": true },
          "targets": [
            {
              "expr": "{source=\"unifi\"} |~ `(?i)(firewall|DROP|IDS|IPS|threat|block)`",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Talos kernel / hardware errors",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 35 },
          "options": { "showTime": true, "wrapLogMessage": true },
          "targets": [
            {
              "expr": "{source=\"talos\"} |~ `(?i)(error|fail|mce|I/O error|link is down|resetting)`",
              "refId": "A"
            }
          ]
        }
      ]
    }
