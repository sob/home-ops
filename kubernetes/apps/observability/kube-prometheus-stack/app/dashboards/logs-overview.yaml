---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs-overview
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Monitoring & Observability"
data:
  logs-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "schemaVersion": 39,
      "tags": ["logs", "observability"],
      "title": "Logs — Overview",
      "uid": "logs-overview",
      "time": { "from": "now-24h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "source",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": "label_values(source)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log ingest rate by source (events/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum by (source) (rate(vector_log_events_total[5m]))",
              "legendFormat": "{{source}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error/Warn events by source (events/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum by (source) (rate(vector_log_events_total{severity=~\"err.*|crit.*|alert|emerg|warn.*|3|2|1|0|4\"}[5m]))",
              "legendFormat": "{{source}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Container error log rate (LogQL)",
          "type": "timeseries",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum by (namespace) (rate({namespace=~\".+\"} |~ `(?i)\\b(error|fatal|panic|exception)\\b` [5m]))",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Live log stream (filtered by $source)",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 16 },
          "options": { "showTime": true, "wrapLogMessage": true, "dedupStrategy": "exact" },
          "targets": [
            {
              "expr": "{source=~\"$source\"}",
              "refId": "A"
            }
          ]
        }
      ]
    }
