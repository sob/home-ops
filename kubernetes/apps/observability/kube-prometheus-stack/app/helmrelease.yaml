---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 30m
  timeout: 15m
  install:
    crds: Skip
    # metal-08 (control-plane) is intentionally offline (garage-rack buildout), so the
    # node-exporter DaemonSet is permanently 9/10 available. Without disableWait, helm
    # waits on full rollout and every install/upgrade times out on that DaemonSet.
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: Skip
    disableWait: true  # see install.disableWait (node-exporter DS never reaches 10/10 while metal-08 is down)
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: prometheus-operator-crds
      namespace: observability
  values:
    crds:
      enabled: false
    cleanPrometheusOperatorObjectNames: true
    defaultRules:
      rules:
        kubeApiserverBurnrate: false
        kubeApiserverAvailability: false
        kubeApiserverHistogram: false
    alertmanager:
      enabled: true
      ingress:
        enabled: false  # served via standalone HTTPRoute (httproute.yaml) on the internal gateway
      alertmanagerSpec:
        useExistingSecret: true
        configSecret: alertmanager-config
        secrets:
          - alertmanager-secret
        configMaps:
          - alertmanager-templates
        storage:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  storage: 1Gi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        retention: 120h  # Keep alerts for 5 days
    kubelet:
      enabled: true
    kubeApiServer:
      enabled: true
    kubeControllerManager:
      enabled: true
      endpoints: &cp
        - 10.1.100.101
        - 10.1.100.102
        - 10.1.100.103
    kubeEtcd:
      enabled: true
      endpoints: *cp
    kubeScheduler:
      enabled: true
      endpoints: *cp
    kubeProxy:
      enabled: false
    prometheus:
      ingress:
        enabled: false  # served via standalone HTTPRoute (httproute.yaml) on the internal gateway
      prometheusSpec:
        enableRemoteWriteReceiver: true
        scrapeInterval: 30s # More frequent for local monitoring
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - memory-snapshot-on-shutdown
          - native-histograms
        # Local retention bumped to 48h so the self-hosted Grafana pane and the
        # daily Claude health-review job have a usable recent window. Long-term
        # history still lives in R2 via the Thanos sidecar (query it by adding
        # Thanos Query/Store later — see docs/log-monitoring.md).
        retention: 48h
        retentionSize: 24GB
        resources:
          requests:
            cpu: 500m
            memory: 2.20Gi
          limits:
            cpu: 2000m
            memory: 4.39Gi
        storageSpec: {}
        # Enable Thanos sidecar for R2 upload
        thanos:
          image: quay.io/thanos/thanos:v0.37.2
          version: v0.37.2
          objectStorageConfig:
            existingSecret:
              name: kube-prometheus-stack-secret
              key: objstore.yml
    prometheusOperator:
      prometheusConfigReloader:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
    nodeExporter:
      enabled: true
    prometheus-node-exporter:
      fullnameOverride: node-exporter
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
      prometheus:
        monitor:
          enabled: true
          additionalLabels:
            prometheus.io/forward: "true"
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: ["__meta_kubernetes_pod_node_name"]
              targetLabel: kubernetes_node
    kubeStateMetrics:
      enabled: true
    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      metricLabelsAllowlist:
        - pods=[*]
        - deployments=[*]
        - persistentvolumeclaims=[*]
      prometheus:
        monitor:
          enabled: true
          additionalLabels:
            prometheus.io/forward: "true"
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: ["__meta_kubernetes_pod_node_name"]
              targetLabel: kubernetes_node
      # Enable custom resource state metrics for k6 TestRuns
      rbac:
        extraRules:
          - apiGroups: ["k6.io"]
            resources: ["testruns"]
            verbs: ["list", "watch", "get"]
      customResourceState:
        enabled: true
        config:
          spec:
            resources:
              - groupVersionKind:
                  group: k6.io
                  version: v1alpha1
                  kind: TestRun
                metricNamePrefix: k6_testrun
                labelsFromPath:
                  name: [metadata, name]
                  namespace: [metadata, namespace]
                  stage: [status, stage]
                metrics:
                  - name: created_timestamp
                    help: "TestRun creation timestamp"
                    each:
                      type: Gauge
                      gauge:
                        path: [metadata, creationTimestamp]
                        nilIsZero: true
    grafana:
      # Self-hosted single pane of glass. Grafana Cloud is now used ONLY for
      # off-cluster alerting (the "is the homelab reachable" safety net); all
      # day-to-day dashboards + log exploration live here on cheap local storage.
      enabled: true
      fullnameOverride: grafana
      replicas: 1
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        storageClassName: ceph-block
        size: 5Gi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
      ingress:
        enabled: false  # served via standalone HTTPRoute (httproute.yaml)
      grafana.ini:
        server:
          root_url: "https://grafana.${SECRET_DOMAIN}"
        analytics:
          reporting_enabled: false
          check_for_updates: false
        auth.anonymous:
          enabled: false
        database:
          # ceph-block (consumer-SSD OSDs, no PLP) has slow per-commit fsync, which made
          # the ~665 first-boot sqlite migrations take 30+ min and tripped every probe /
          # deadline. WAL batches syncs at checkpoints: first boot drops to ~14s.
          wal: true
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          label: grafana_dashboard
          labelValue: "1"
          folderAnnotation: grafana_folder
          provider:
            foldersFromFilesStructure: true
        datasources:
          enabled: true
          searchNamespace: ALL
          label: grafana_datasource
          labelValue: "1"
      # Prometheus + Alertmanager datasources are auto-provisioned by the stack.
      # Add the self-hosted Loki here so logs + metrics share one pane.
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://loki-headless.observability.svc.cluster.local:3100
          jsonData:
            maxLines: 1000
