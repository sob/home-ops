---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: health-review
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      health-review:
        type: cronjob
        annotations:
          reloader.stakater.com/auto: "true"
        cronjob:
          # 07:00 America/Chicago — a morning digest.
          schedule: "0 13 * * *"
          timeZone: America/Chicago
          backoffLimit: 1
          successfulJobsHistory: 3
          failedJobsHistory: 3
          concurrencyPolicy: Forbid
          activeDeadlineSeconds: 1200
        containers:
          app:
            image:
              repository: docker.io/library/node
              tag: 22-bookworm
            command:
              - /bin/bash
              - -c
              - |
                set -euo pipefail
                export HOME=/tmp
                npm install -g @anthropic-ai/claude-code >/tmp/npm.log 2>&1 || { echo "npm install failed"; cat /tmp/npm.log; exit 1; }
                exec bash /config/run.sh
            env:
              TZ: America/Chicago
              PROM_URL: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
              LOKI_URL: http://loki-headless.observability.svc.cluster.local:3100
            envFrom:
              - secretRef:
                  name: health-review-secret
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    persistence:
      scripts:
        type: configMap
        name: health-review-scripts
        defaultMode: 0555
        globalMounts:
          - path: /config/run.sh
            subPath: run.sh
            readOnly: true
          - path: /config/prompt.md
            subPath: prompt.md
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
