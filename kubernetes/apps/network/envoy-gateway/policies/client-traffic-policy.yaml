---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/clienttrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: gateway-client-policy
  namespace: network
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal-gateway
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
  # HTTP/2 support. The http2 block only tunes h2 parameters; the downstream
  # listener still won't advertise h2 unless it is in the ALPN list, so set it
  # explicitly (browsers otherwise fall back to HTTP/1.1 and its 6-connection
  # cap, which serialised Seerr's ~47 JS chunks into an 11s load).
  tls:
    alpnProtocols:
      - h2
      - http/1.1
  http2:
    initialConnectionWindowSize: 1048576  # 1MB
    initialStreamWindowSize: 65536        # 64KB
    maxConcurrentStreams: 100
  # Client timeout settings
  timeout:
    http:
      requestReceivedTimeout: 120s
  # Connection settings
  connection:
    bufferLimit: 32Ki
  # Client IP detection
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
  # Headers configuration
  headers:
    enableEnvoyHeaders: false
    withUnderscoresAction: RejectRequest
