---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  # Took over the cilium external-gateway's name + IP (.201) during the
  # Cilium->Envoy L7 cutover. external-dns (cloudflare) filters on
  # --gateway-name=external-gateway, so this name is load-bearing for DNS.
  # target matches the old cilium external gateway (external.56kbps.io).
  name: external-gateway
  namespace: network
  annotations:
    external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
    external-dns.alpha.kubernetes.io/is-public: "true"
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https-56kbps
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN/./-}-production-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-halfduplex
      protocol: HTTPS
      port: 443
      hostname: "*.halfduplex.io"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: halfduplex-io-production-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-halfduplex-apex
      protocol: HTTPS
      port: 443
      hostname: "halfduplex.io"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: halfduplex-io-production-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-56kbps-apex
      protocol: HTTPS
      port: 443
      hostname: "${SECRET_DOMAIN}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN/./-}-production-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-flux
      protocol: HTTPS
      port: 443
      hostname: "flux-webhook.${SECRET_DOMAIN}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN/./-}-production-tls"
      allowedRoutes:
        namespaces:
          from: All
  # Pin the LB IP via the Cilium annotation on the generated Service. The
  # envoy-gateway-external-pool's owning-gateway-name selector alone is NOT
  # deterministic: cilium-pool has no serviceSelector (matches every LB Service)
  # and its .220-.230 range would otherwise win. Requesting .201 forces the
  # envoy pool (only it contains .201). Do NOT use spec.addresses — Envoy Gateway
  # echoes it into status but does not propagate it to the Service's loadBalancerIP.
  infrastructure:
    annotations:
      io.cilium/lb-ipam-ips: "10.1.100.201"
