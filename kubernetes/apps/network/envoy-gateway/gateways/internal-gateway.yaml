---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  # Took over the cilium internal-gateway's name + IP (.200) during the
  # Cilium->Envoy L7 cutover. external-dns (unifi) filters on
  # --gateway-name=internal-gateway, so this name is load-bearing for DNS.
  # No external-dns target annotation (matches old cilium gw → A record to .200).
  name: internal-gateway
  namespace: network
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https-56kbps
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN/./-}-production-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-halfduplex
      protocol: HTTPS
      port: 443
      hostname: "*.halfduplex.io"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: halfduplex-io-production-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-halfduplex-apex
      protocol: HTTPS
      port: 443
      hostname: "halfduplex.io"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: halfduplex-io-production-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-56kbps-apex
      protocol: HTTPS
      port: 443
      hostname: "${SECRET_DOMAIN}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN/./-}-production-tls"
      allowedRoutes:
        namespaces:
          from: All
  # Pin the LB IP via the Cilium annotation on the generated Service. The
  # envoy-gateway-internal-pool's owning-gateway-name selector alone is NOT
  # deterministic: cilium-pool has no serviceSelector (matches every LB Service)
  # and its .220-.230 range would otherwise win. Requesting .200 forces the
  # envoy pool (only it contains .200). Do NOT use spec.addresses — Envoy Gateway
  # echoes it into status but does not propagate it to the Service's loadBalancerIP.
  infrastructure:
    annotations:
      io.cilium/lb-ipam-ips: "10.1.100.200"
