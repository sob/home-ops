---
# CiliumLoadBalancerIPPool for Envoy Gateway Internal
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: envoy-gateway-internal-pool
  labels:
    app.kubernetes.io/name: envoy-gateway
spec:
  blocks:
    - start: 10.1.100.200
      stop: 10.1.100.200
  serviceSelector:
    matchExpressions:
      - key: gateway.envoyproxy.io/owning-gateway-name
        operator: In
        values:
          - internal-gateway
---
# CiliumLoadBalancerIPPool for Envoy Gateway External
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: envoy-gateway-external-pool
  labels:
    app.kubernetes.io/name: envoy-gateway
spec:
  blocks:
    - start: 10.1.100.201
      stop: 10.1.100.201
  serviceSelector:
    matchExpressions:
      - key: gateway.envoyproxy.io/owning-gateway-name
        operator: In
        values:
          - external-gateway
