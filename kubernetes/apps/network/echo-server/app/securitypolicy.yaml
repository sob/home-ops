---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
# Enforces Authentik forward-auth on the echo-server app HTTPRoute via Envoy
# ext-auth against the proxy outpost's /outpost.goauthentik.io/auth/envoy
# endpoint. x-forwarded-proto is forwarded so the outpost builds absolute https
# redirect URLs (authentik Envoy mode otherwise emits protocol-relative URLs
# that break some mobile browsers — goauthentik/authentik#19653).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: echo-server
  namespace: network
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: echo-server
  extAuth:
    failOpen: false
    recomputeRoute: true
    headersToExtAuth:
      - X-Forwarded-For
      - X-Real-Ip
      - accept
      - cookie
      - authorization
      - proxy-authorization
      - x-forwarded-proto
    http:
      backendRefs:
        - kind: Service
          name: ak-outpost-halfduplex
          namespace: security
          port: 9000
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
        - Set-Cookie
        - X-authentik-uid
        - X-authentik-username
        - X-authentik-name
        - X-authentik-email
        - X-authentik-groups
        - X-authentik-entitlements
