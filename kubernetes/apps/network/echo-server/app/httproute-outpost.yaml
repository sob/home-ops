---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
# Serves the Authentik login/callback flow (/outpost.goauthentik.io/*) on the
# app's hostname, routed to the proxy outpost. Deliberately a SEPARATE HTTPRoute
# from the app route so it is NOT covered by the SecurityPolicy ext-auth (the
# redirect/callback must be reachable unauthenticated). More-specific path wins,
# so these requests go here and everything else falls through to the app route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-server-outpost
  namespace: network
spec:
  parentRefs:
    - name: external-gateway
      namespace: network
      sectionName: https-56kbps
    - name: internal-gateway
      namespace: network
      sectionName: https-56kbps
  hostnames:
    - "echo-server.56kbps.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
      backendRefs:
        - name: ak-outpost-56kbps
          namespace: security
          port: 9000
