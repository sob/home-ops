---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: authentik-postgresql
  namespace: security
spec:
  sourcePVC: data-authentik-postgresql-0
  trigger:
    schedule: "0 3 * * *"  # Daily at 3 AM
  restic:
    copyMethod: Snapshot
    # Required: the cluster has no default VolumeSnapshotClass, so without this
    # every snapshot failed ("cannot find default snapshot class") and this
    # backup was stuck "Synchronizing" from 2025-10-19 onward.
    volumeSnapshotClassName: csi-ceph-blockpool
    # Native unlock (same design as components/volsync): unlock-then-backup in
    # the mover. Bump the suffix to re-run after a stale lock.
    unlock: "unlock-1"
    cacheStorageClassName: ceph-block
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    pruneIntervalDays: 14
    retain:
      daily: 14
      within: 3d
    repository: authentik-postgresql-restic-secret
  paused: false
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationdestination_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: authentik-postgresql-dst
  namespace: security
spec:
  trigger:
    manual: restore-once
  restic:
    copyMethod: Snapshot
    volumeSnapshotClassName: csi-ceph-blockpool
    repository: authentik-postgresql-restic-secret
    cacheStorageClassName: ceph-block
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    accessModes:
      - ReadWriteOnce
    storageClassName: ceph-block
    capacity: 10Gi  # Must match the PVC size
  paused: true
