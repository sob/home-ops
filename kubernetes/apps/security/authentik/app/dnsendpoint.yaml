---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: authentik-ipv6-block
  namespace: security
  annotations:
    external-dns.alpha.kubernetes.io/target: "::1"
spec:
  endpoints:
    # Block IPv6 for SSO to prevent upstream lookups returning Cloudflare IPs
    - dnsName: sso.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"  # IPv6 localhost - prevents upstream lookup
    - dnsName: sso.56kbps.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    # Also block IPv6 for homelab services that should never use Cloudflare
    - dnsName: radarr.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: sonarr.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: lidarr.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: readarr.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: prowlarr.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: bazarr.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: tautulli.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: sab.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: qbittorrent.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: echo-server.halfduplex.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    # Block IPv6 for enigma-bbs services on 56kbps.io
    - dnsName: 56kbps.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: enigma.56kbps.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: edit.56kbps.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
    - dnsName: draw.56kbps.io
      recordTTL: 300
      recordType: AAAA
      targets:
        - "::1"
