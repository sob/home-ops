---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/backendtrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: seerr
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: seerr
  # Seerr is a single-threaded Node process (SSR is CPU-bound and blocks the
  # event loop). The gateway->seerr upstream is HTTP/1.1, so maxConnections is
  # the real concurrency limiter: one request per connection. HTTP/2 let the
  # browser open 100+ concurrent streams, Envoy fanned them onto that many h1
  # connections, saturated the event loop for >60s, and the liveness probe
  # killed the pod (observed UF/UC/UT + repeated restarts).
  #
  # Cap connections to ~20 concurrent and QUEUE the rest via maxPendingRequests
  # (queuing, not 503 rejection). Never retry a timeout. Circuit breakers are
  # per-cluster, so the fast /imageproxy -> varnish backend is unaffected.
  circuitBreaker:
    maxConnections: 20
    maxPendingRequests: 1024
    maxParallelRequests: 1024
  retry:
    numRetries: 1
    retryOn:
      httpStatusCodes:
        - 503
  timeout:
    http:
      requestTimeout: 30s
