---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/backendtrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: seerr
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: seerr
  # The real killer of Seerr under HTTP/2 was the global 3x retry-on-504:
  # a burst of concurrent TMDB-backed lookups (e.g. the Requests page) that
  # timed out got retried 4x, snowballing into a crash (observed 185 UT /
  # 172 504 / exitCode 1). Seerr itself handles ~80 concurrent fine (<600ms).
  # So: never retry a timeout (503 only, once), and keep a high circuit-breaker
  # purely as an aggregate safety net that won't reject a single client's
  # burst. Circuit breakers are per-cluster, so the fast /imageproxy -> varnish
  # backend on the same route is unaffected.
  circuitBreaker:
    maxParallelRequests: 100
    maxPendingRequests: 512
    maxConnections: 512
  retry:
    numRetries: 1
    retryOn:
      httpStatusCodes:
        - 503
  timeout:
    http:
      requestTimeout: 30s
