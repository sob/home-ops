---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: enigma-bbs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: enigma-bbs
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      enigma-bbs:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-vtx:
            image:
              repository: docker.io/alpine
              tag: 3.24
            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache curl tar
                cd /vtx
                if [ ! -f index.html ]; then
                  echo "Downloading VTX client files..."
                  curl -fsSL https://github.com/codewar65/VTX_ClientServer/archive/refs/heads/master.tar.gz | tar xz --strip-components=2 VTX_ClientServer-master/www
                  echo "VTX client ready"
                else
                  echo "VTX client files already exist, skipping download"
                fi
                # Ensure WebSocket URL and sysName are always correct
                sed -i 's|wsConnect:.*|wsConnect: "wss://wss.halfduplex.io",|' index.html
                sed -i 's|sysName:.*|sysName: "halfduplex BBS",|' index.html
                # Fix vtxclient.js filename reference
                sed -i 's|vtxclient_94.js|vtxclient.js|' index.html
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
          init-config:
            image:
              repository: docker.io/alpine
              tag: 3.24
            command:
              - /bin/sh
              - -c
              - |
                CONFIG_FILE=/enigma-bbs/config/config.hjson
                if [ -f "$CONFIG_FILE" ]; then
                  echo "Patching ENiGMA config for halfduplex.io..."
                  sed -i "s|boardName: 56kbps|boardName: halfduplex|" "$CONFIG_FILE"
                  sed -i "s#prettyBoardName : '|0856kbps'#prettyBoardName : '|08halfduplex'#" "$CONFIG_FILE"
                  sed -i "s|website         : 'https://56kbps.io'|website         : 'https://halfduplex.io'|" "$CONFIG_FILE"
                  sed -i "s|menuFile: /enigma-bbs/menus/56kbps-main.hjson|menuFile: /enigma-bbs/menus/halfduplex-main.hjson|" "$CONFIG_FILE"
                  sed -i "s|domain: 56kbps.io|domain: halfduplex.io|" "$CONFIG_FILE"
                else
                  echo "No config.hjson found yet; skipping patch"
                fi
                # Rename menu files if they still use the old 56kbps prefix
                for f in /enigma-bbs/menus/56kbps-*.hjson; do
                  [ -e "$f" ] || continue
                  newname=$(echo "$f" | sed 's/56kbps-/halfduplex-/')
                  mv "$f" "$newname"
                done
                # Update any 56kbps menu references inside menu files
                sed -i 's|56kbps-|halfduplex-|g' /enigma-bbs/menus/*.hjson 2>/dev/null || true
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
        containers:
          app:
            image:
              repository: ghcr.io/sob/enigma-bbs
              tag: 0792e93f13e4@sha256:66dff98add1d5018e9675f4b8804ec0f048e8cca2b2f0254e9c68d29a0213a43
            env:
              TZ: America/Chicago
              NODE_ENV: production
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
          nginx:
            image:
              repository: docker.io/nginxinc/nginx-unprivileged
              tag: 1.31-alpine
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.105.1
            args:
              - --auth
              - none
              - --user-data-dir
              - /enigma-bbs/config/.vscode
              - --extensions-dir
              - /enigma-bbs/config/.vscode
              - --port
              - "8443"
              - /enigma-bbs
            env:
              TZ: America/Chicago
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              runAsUser: 1000
              runAsGroup: 1000
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8443
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8443
          text0wnz:
            image:
              repository: ghcr.io/sob/text0wnz
              tag: rolling
              pullPolicy: Always
            env:
              TZ: America/Chicago
              NODE_ENV: production
              DEBUG: "false"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: enigma-bbs
        ports:
          telnet:
            port: 23
            protocol: TCP
          ssh:
            port: 22
            protocol: TCP
          wss:
            port: 8811
            protocol: TCP
            targetPort: 8812  # Route to nginx proxy which cleans XFF
          binkp:
            port: 24554
            protocol: TCP
          http:
            port: 80
            protocol: TCP
            targetPort: 8080
          code:
            port: 8443
            protocol: TCP
          draw:
            port: 8888
            protocol: TCP
            targetPort: 3000
    route:
      # code-server editor (edit.halfduplex.io) — Authentik forward-auth enforced by
      # securitypolicy.yaml; login flow served by httproute-outpost.yaml.
      code:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.halfduplex.io
        hostnames:
          - edit.halfduplex.io
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external-gateway
            namespace: network
            sectionName: https-halfduplex
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal-gateway
            namespace: network
            sectionName: https-halfduplex
        rules:
          - backendRefs:
              - name: enigma-bbs
                port: 8443
            matches:
              - path:
                  type: PathPrefix
                  value: /
      # draw app (draw.halfduplex.io) — public, no auth (no SecurityPolicy targets it).
      draw:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.halfduplex.io
        hostnames:
          - draw.halfduplex.io
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external-gateway
            namespace: network
            sectionName: https-halfduplex
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal-gateway
            namespace: network
            sectionName: https-halfduplex
        rules:
          - backendRefs:
              - name: enigma-bbs
                port: 8888
            matches:
              - path:
                  type: PathPrefix
                  value: /
      websocket:
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external-gateway
            namespace: network
            sectionName: https-halfduplex
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal-gateway
            namespace: network
            sectionName: https-halfduplex
        hostnames:
          - wss.halfduplex.io
        rules:
          - backendRefs:
              - name: enigma-bbs
                port: 8811
            matches:
              - path:
                  type: PathPrefix
                  value: /
      web:
        parentRefs:
          # apex listener serves the bare halfduplex.io; the wildcard listener
          # serves enigma.halfduplex.io (exact-apex listeners don't match subdomains)
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external-gateway
            namespace: network
            sectionName: https-halfduplex-apex
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal-gateway
            namespace: network
            sectionName: https-halfduplex-apex
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external-gateway
            namespace: network
            sectionName: https-halfduplex
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal-gateway
            namespace: network
            sectionName: https-halfduplex
        hostnames:
          - halfduplex.io
          - enigma.halfduplex.io
        rules:
          - backendRefs:
              - name: enigma-bbs
                port: 80
            matches:
              - path:
                  type: PathPrefix
                  value: /
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          enigma-bbs:
            app:
              - path: /enigma-bbs/config
                subPath: config
              - path: /enigma-bbs/db
                subPath: db
              - path: /enigma-bbs/filebase
                subPath: filebase
              - path: /enigma-bbs/art
                subPath: art
              - path: /enigma-bbs/mods
                subPath: mods
              - path: /enigma-bbs/menus
                subPath: menus
              - path: /enigma-bbs/mail
                subPath: mail
              - path: /enigma-bbs/doors
                subPath: doors
            code-server:
              - path: /enigma-bbs/config
                subPath: config
              - path: /enigma-bbs/db
                subPath: db
              - path: /enigma-bbs/filebase
                subPath: filebase
              - path: /enigma-bbs/art
                subPath: art
              - path: /enigma-bbs/mods
                subPath: mods
              - path: /enigma-bbs/menus
                subPath: menus
              - path: /enigma-bbs/mail
                subPath: mail
              - path: /enigma-bbs/vtx
                subPath: vtx
              - path: /enigma-bbs/doors
                subPath: doors
            text0wnz:
              - path: /art
                subPath: art
            init-vtx:
              - path: /vtx
                subPath: vtx
            init-config:
              - path: /enigma-bbs/config
                subPath: config
              - path: /enigma-bbs/menus
                subPath: menus
            nginx:
              - path: /usr/share/nginx/html
                subPath: vtx
      logs:
        type: emptyDir
        globalMounts:
          - path: /enigma-bbs/logs
      tmpfs:
        type: emptyDir
        advancedMounts:
          enigma-bbs:
            app:
              - path: /tmp
      run:
        type: emptyDir
        advancedMounts:
          enigma-bbs:
            app:
              - path: /var/run
      var-log:
        type: emptyDir
        advancedMounts:
          enigma-bbs:
            app:
              - path: /var/log
      nginx-config:
        type: configMap
        name: enigma-bbs-nginx-config
        advancedMounts:
          enigma-bbs:
            nginx:
              - path: /etc/nginx/nginx.conf
                subPath: nginx.conf
                readOnly: true
      nginx-tmp:
        type: emptyDir
        advancedMounts:
          enigma-bbs:
            nginx:
              - path: /tmp
      nginx-cache:
        type: emptyDir
        advancedMounts:
          enigma-bbs:
            nginx:
              - path: /var/cache/nginx
      nginx-log:
        type: emptyDir
        advancedMounts:
          enigma-bbs:
            nginx:
              - path: /var/log/nginx
