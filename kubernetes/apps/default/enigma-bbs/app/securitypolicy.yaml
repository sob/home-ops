---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
# Authentik forward-auth for the enigma-bbs code editor (edit.56kbps.io) via the
# 56kbps outpost. Targets only the `code` route — the web/websocket/draw routes
# remain public.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: enigma-bbs-code
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: enigma-bbs-code
  extAuth:
    failOpen: false
    recomputeRoute: true
    headersToExtAuth:
      - X-Forwarded-For
      - X-Real-Ip
      - accept
      - cookie
      - authorization
      - proxy-authorization
      - x-forwarded-proto
    http:
      backendRefs:
        - kind: Service
          name: ak-outpost-56kbps
          namespace: security
          port: 9000
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
        - Set-Cookie
        - X-authentik-uid
        - X-authentik-username
        - X-authentik-name
        - X-authentik-email
        - X-authentik-groups
        - X-authentik-entitlements
