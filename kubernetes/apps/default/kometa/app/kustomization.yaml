---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./ocirepository.yaml
  - ./helmrelease.yaml
configMapGenerator:
  - name: kometa-configmap
    files:
      - marvel.yml=./resources/collections/marvel.yml
      - spider-man.yml=./resources/collections/spider-man.yml
generatorOptions:
  disableNameSuffixHash: true
