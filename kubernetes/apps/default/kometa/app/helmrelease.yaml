---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kometa
spec:
  chartRef:
    kind: OCIRepository
    name: kometa
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      kometa:
        type: cronjob
        annotations:
          reloader.stakater.com/auto: "true"
        cronjob:
          schedule: "0 8 * * *"
          successfulJobsHistory: 1
          failedJobsHistory: 1
          backoffLimit: 3
        initContainers:
          copy-config:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                cp /configmap/config.yml /config/config.yml
                mkdir -p /config/collections
                cp /configmap/marvel.yml /config/collections/marvel.yml
                cp /configmap/spider-man.yml /config/collections/spider-man.yml
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: kometateam/kometa
              tag: v2.4.4
            env:
              TZ: America/Chicago
              KOMETA_RUN: "true"
              KOMETA_CONFIG: /config/config.yml
              KOMETA_PLEX_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: kometa-secret
                    key: PLEX_TOKEN
              KOMETA_TMDB_APIKEY:
                valueFrom:
                  secretKeyRef:
                    name: kometa-secret
                    key: TMDB_APIKEY
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1024
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      config:
        existingClaim: kometa
      configmap:
        type: configMap
        name: kometa-configmap
        advancedMounts:
          kometa:
            copy-config:
              - path: /configmap
                readOnly: true
