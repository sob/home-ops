---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cert-exporter-doom
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: cert-exporter-doom
  interval: 30m
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      cert-deploy:
        type: cronjob
        cronjob:
          concurrencyPolicy: Forbid
          schedule: "@daily"
          backoffLimit: 0
        containers:
          app:
            image:
              repository: neilpang/acme.sh
              tag: 3.1.4@sha256:08bad323dd6537ea2caba64260ef6e70e96057c4d9214afb9c07861db26653d9
            command: ['/bin/sh', '/scripts/export.sh']
            envFrom:
              - secretRef:
                  name: cert-exporter-doom-secret
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    persistence:
      scripts:
        name: cert-exporter-configmap
        enabled: true
        type: configMap
        globalMounts:
          - path: /scripts
            readOnly: true
      certificate-data:
        type: persistentVolumeClaim
        existingClaim: cert-exporter
        globalMounts:
          - path: /acme.sh/doom.${SECRET_INTERNAL_DOMAIN}
            subPath: doom.${SECRET_INTERNAL_DOMAIN}
