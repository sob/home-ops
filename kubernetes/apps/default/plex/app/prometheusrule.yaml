---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: plex
  namespace: default
spec:
  groups:
    - name: plex.rules
      interval: 1m
      rules:
        - alert: PlexDown
          expr: |
            min(up{job="plex",namespace="default"}) < 1
          for: 5m
          labels:
            severity: critical
            type: workload
          annotations:
            summary: "Plex media server is down"
            description: "Plex has been unreachable for 5 minutes. Users cannot stream media."
            runbook_url: "https://github.com/sob/home-ops/wiki/Alerts/PlexDown"

        - alert: HighPlexLoad
          expr: |
            tautulli_stream_count > 10
          for: 5m
          labels:
            severity: info
            type: workload
          annotations:
            summary: "High Plex streaming load"
            description: "Plex has {{ $value }} concurrent streams (threshold: 10)"
            runbook_url: "https://github.com/sob/home-ops/wiki/Alerts/HighPlexLoad"

        - alert: MediaLibraryStorageLow
          expr: |
            min(radarr_rootfolder_freespace_bytes) < 50000000000
          for: 30m
          labels:
            severity: warning
            type: workload
          annotations:
            summary: "Media library storage is low"
            description: "Less than 50GB free on the media library root folder. New downloads/imports will start failing."
            runbook_url: "https://github.com/sob/home-ops/wiki/Alerts/MediaLibraryStorageLow"
