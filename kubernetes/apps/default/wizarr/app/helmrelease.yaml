---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wizarr
spec:
  chartRef:
    kind: OCIRepository
    name: wizarr
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      wizarr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/wizarrrr/wizarr
              tag: 2025.7.7
            env:
              TZ: America/Chicago
            resources:
              requests:
                cpu: 200m
                memory: 131Mi
              limits:
                memory: 286.1Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: 5690
    # No serviceMonitor: wizarr does not expose Prometheus metrics (/metrics 404).
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/is-public: "true"
        hostnames:
          - wizarr.${SECRET_DOMAIN}
          - join.${SECRET_DOMAIN}
        parentRefs:
          - name: external-gateway
            namespace: network
            sectionName: https-56kbps
          - name: internal-gateway
            namespace: network
            sectionName: https-56kbps
        rules:
          - backendRefs:
              - identifier: app
                port: 5690
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /data/database
