---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Org-level runners for github.com/doorgames-io. Workflows target these with:
    #   runs-on: arc-linux
    githubConfigUrl: https://github.com/doorgames-io
    # References the Secret materialised by the ExternalSecret above (GitHub App auth).
    githubConfigSecret: arc-github-app
    runnerScaleSetName: arc-linux
    runnerGroup: default
    # Keep one runner warm; burst up to six on demand. Each job runs in a fresh,
    # ephemeral pod that is destroyed on completion.
    minRunners: 1
    maxRunners: 6
    containerMode:
      type: kubernetes
      # Per-runner ephemeral _work volume. CephFS (ceph-filesystem/RWX) can't mount on
      # these Talos nodes (no `ceph` kernel module), so use ceph-block (RBD/RWO) like the
      # rest of the cluster. RWO is fine for ordinary jobs; workflows using `container:`/
      # `services:` would need their hook pods co-scheduled, or a true RWX backend.
      kubernetesModeWorkVolumeClaim:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ceph-block
        resources:
          requests:
            storage: 10Gi
