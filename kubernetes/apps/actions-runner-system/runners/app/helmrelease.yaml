---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Org-level runners for github.com/doorgames-io. Workflows target these with:
    #   runs-on: arc-linux
    githubConfigUrl: https://github.com/doorgames-io
    # References the Secret materialised by the ExternalSecret above (GitHub App auth).
    githubConfigSecret: arc-github-app
    runnerScaleSetName: arc-linux
    runnerGroup: default
    # Name the controller SA explicitly so `helm template` (flux-local CI) doesn't
    # need to discover the live controller Deployment (which fails outside a real
    # cluster). MUST match the deployed gha-runner-scale-set-controller SA — verify
    # with: kubectl -n actions-runner-system get sa | grep controller
    controllerServiceAccount:
      namespace: actions-runner-system
      name: gha-runner-scale-set-controller
    # Keep one runner warm; burst up to six on demand. Each job runs in a fresh,
    # ephemeral pod that is destroyed on completion.
    minRunners: 1
    maxRunners: 6
    # dind (Docker-in-Docker), NOT kubernetes container mode. In kubernetes mode
    # every job MUST declare a `container:` — jobs that run steps directly on the
    # runner (all of ours: the TS/Workers test + deploy jobs migrated from
    # ubuntu-latest) are rejected with:
    #   "Jobs without a job container are forbidden on this runner..."
    # dind runs those jobs directly on an ephemeral runner pod, like a GitHub-hosted
    # runner, with a privileged docker sidecar available for any container/service
    # steps. The _work dir is a per-pod emptyDir, which also sidesteps both the
    # RWO/RBD hook-pod co-scheduling limitation and the _work/_tool ownership error
    # that kubernetes mode hit (actions/actions-runner-controller#2890). The
    # actions-runner-system namespace has no restricted PodSecurity enforcement, so
    # the privileged dind sidecar is permitted.
    containerMode:
      type: dind
