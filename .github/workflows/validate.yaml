---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Validate"

# Runs on every PR (no path filter) so the `Validate Success` gate always
# reports — required-status-check branch protection blocks a PR forever if a
# path-filtered workflow is skipped. Heavy jobs are gated internally on the
# `changes` job instead, so unrelated PRs finish in seconds.
on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

# Read-only by default; jobs that comment on the PR opt into pull-requests:write.
permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      kubernetes: ${{ steps.filter.outputs.kubernetes }}
    steps:
      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            kubernetes:
              - 'kubernetes/**'
              - '.github/workflows/validate.yaml'
              - '.github/scripts/**'
              - '.github/policies/**'
              - '.mise.toml'
              - '.yamllint.yaml'

  # Runs the same `task validate:*` commands you run locally (via pre-push hooks
  # / `task validate`). Tools come from .mise.toml so versions match your machine.
  # All steps are BLOCKING. Only runs when manifests/config changed.
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.kubernetes == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: YAML lint
        run: task validate:yaml

      - name: Schema validation (app-template values, Flux)
        run: task validate:schema

      - name: Kustomize build
        run: task validate:kustomize

      - name: Kubeconform
        run: task validate:kubeconform

  # Advisory (non-blocking): flux-local `test` renders every HelmRelease, but
  # `flux build ks` envsubst needs the SOPS-encrypted ${SECRET_*} substitution
  # vars, which CI can't decrypt — so it fails on var substitution, not on real
  # manifest errors. Wire a SOPS_AGE_KEY secret + decryption to make this green,
  # then move it into the validate-success gate. flux-diff already exercises
  # rendering as a blocking-adjacent signal.
  flux-test:
    name: Flux Local Test (advisory)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.kubernetes == 'true'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Flux local test
        run: task validate:flux

  opa-policies:
    name: OPA Policies
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.kubernetes == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Run OPA policy validation
        run: task validate:opa

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.6
        with:
          extra_args: --only-verified

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_SUMMARY: true

  # Informational: renders the PR vs main and posts the diff as a comment.
  # Not part of the merge gate.
  flux-diff:
    name: Flux Diff
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.kubernetes == 'true'
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resource: ["helmrelease", "kustomization"]
      fail-fast: false
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Generate diff
        id: diff
        run: |
          set -euo pipefail
          exit_code=0
          flux-local diff ${{ matrix.resource }} \
            --unified 6 \
            --path ./kubernetes/flux/cluster \
            --path-orig ./main/kubernetes/flux/cluster \
            --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart" \
            --limit-bytes 50000 \
            --all-namespaces \
            --sources flux-system \
            --output-file diff.patch || exit_code=$?

          # flux-local diff returns 1 when there are differences (expected).
          if [ $exit_code -gt 1 ]; then
            echo "::error::flux-local diff failed with exit code $exit_code"
            exit $exit_code
          fi

          if [ -s diff.patch ]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
            {
              echo 'diff<<EOF'
              cat diff.patch
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Add PR comment
        if: steps.diff.outputs.has_diff == 'true'
        uses: mshick/add-pr-comment@v2
        with:
          message-id: flux-diff-${{ matrix.resource }}
          message: |
            ### Flux ${{ matrix.resource }} diff

            <details>
            <summary>View diff</summary>

            ```diff
            ${{ steps.diff.outputs.diff }}
            ```

            </details>

  # Merge gate — the single required status check. Always runs and reports.
  # A skipped job (PR touched no manifests) counts as success; only an actual
  # failure/cancellation blocks the merge.
  validate-success:
    name: Validate Success
    runs-on: ubuntu-latest
    needs: [validate, opa-policies, secret-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          for result in \
            "validate=${{ needs.validate.result }}" \
            "opa-policies=${{ needs.opa-policies.result }}" \
            "secret-scan=${{ needs.secret-scan.result }}"; do
            name="${result%%=*}"
            status="${result#*=}"
            if [[ "$status" == "failure" || "$status" == "cancelled" ]]; then
              echo "::error::${name} ${status}"
              failed=true
            fi
          done
          if [[ "${failed:-false}" == "true" ]]; then
            exit 1
          fi
          echo "✅ Validation gate satisfied"
