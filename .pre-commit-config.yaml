---
# See https://pre-commit.com for more information
#
# Two-tier model:
#   pre-commit (fast, every commit): whitespace, YAML parse + lint, secrets, naming
#   pre-push   (heavy, before remote): kustomize build + kubeconform
# `pre-commit install` wires both hook types (default_install_hook_types below);
# `mise install` runs that for you via the postinstall hook in .mise.toml.
default_install_hook_types: [pre-commit, pre-push]
# Pin python-language hooks (e.g. yamllint) to python3.14 so they don't fall
# back to the system python3 (3.9.6), which is too old for modern yamllint.
# Matches the mise-pinned python 3.14.x used in CI (local == CI).
default_language_version:
  python: python3.14
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - -c
          - ".yamllint.yaml"

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: forbid-crlf
      - id: forbid-tabs

  - repo: https://github.com/sirosen/texthooks
    rev: 0.6.7
    hooks:
      - id: fix-smartquotes
      - id: fix-ligatures

  - repo: local
    hooks:
      # Use the mise-pinned gitleaks binary (language: system) instead of the
      # upstream golang hook, which compiles gitleaks from source on every machine.
      - id: gitleaks
        name: Detect hardcoded secrets (gitleaks)
        entry: mise exec -- gitleaks git --staged --pre-commit --redact --verbose
        language: system
        pass_filenames: false

      # Validate each changed file against the JSON schema in its
      # `# yaml-language-server` modeline — i.e. app-template HelmRelease
      # spec.values (typos / indentation / wrong types) and Flux resources.
      - id: schema-validation
        name: JSON schema (app-template values, Flux)
        entry: mise exec -- .github/scripts/validate-schemas.sh
        language: system
        files: '^kubernetes/.*\.yaml$'
        exclude: '\.sops\.yaml$'

      - id: validate-sops
        name: Validate SOPS files
        entry: >-
          bash -c 'for file in "$@"; do
            if [[ "$file" == *.sops.yaml ]]; then
              if ! grep -q "ENC\[AES256_GCM" "$file"; then
                echo "ERROR: $file is a .sops.yaml file but does not appear to be encrypted";
                exit 1;
              fi;
            fi;
          done' --
        language: system
        files: '\.sops\.yaml$'
        exclude: '^\.sops\.yaml$'

      - id: validate-kubernetes-files
        name: Validate Kubernetes file naming
        entry: >-
          bash -c 'for file in "$@"; do
            if [[ "$file" =~ kubernetes/apps/.*/.*\.yaml$ ]] &&
                [[ ! "$file" =~ (kustomization|helmrelease|ks|externalsecret|secret\.sops)\.yaml$ ]] &&
                [[ ! "$file" =~ ^kubernetes/apps/[^/]+/[^/]+/.+/ ]]; then
              echo "ERROR: $file does not follow naming conventions";
              exit 1;
            fi;
          done' --
        language: system
        files: '^kubernetes/.*\.yaml$'

      - id: no-direct-secrets
        name: Check for plaintext secrets
        entry: mise exec -- .github/scripts/check-plaintext-secrets.sh
        language: system
        files: '\.yaml$'
        exclude: '\.sops\.yaml$'

      # --- Heavy checks: pre-push only (too slow for every commit) ---
      - id: kustomize-build
        name: Kustomize build (all overlays)
        entry: mise exec -- task validate:kustomize
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: kubeconform
        name: Kubeconform schema validation
        entry: mise exec -- task validate:kubeconform
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

exclude: |
  (?x)^(
    .*.sample$|
    kubernetes/apps/.*/schemas/.*|
    kubernetes/apps/.*/files/.*|
    kubernetes/apps/.*/resources/.*\.yaml$
  )
